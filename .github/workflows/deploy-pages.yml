name: Publicar site no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publicar site estatico
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Preparar arquivos estaticos
        run: |
          mkdir -p dist
          cp index.html dist/
          cp mobile-preview.html dist/
          cp styles.css dist/
          cp script.js dist/
          cp -R site-assets dist/

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato estatico
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
